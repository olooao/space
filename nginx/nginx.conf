events {
    worker_connections 1024;
}

http {
    # Rate limiting zone
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    upstream tle_service       { server tle_service:8001; }
    upstream orbital_service   { server orbital_service:8002; }
    upstream collision_service { server collision_service:8003; }
    upstream kessler_service   { server kessler_service:8004; }
    upstream events_service    { server events_service:8005; }

    server {
        listen 80;
        server_name _;

        # CORS headers for all responses
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

        # Handle OPTIONS preflight requests
        location / {
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # TLE Service
        location /api/tle/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://tle_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Orbital Service
        location /api/orbital/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://orbital_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Collision Service
        location /api/collision/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://collision_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Kessler Service
        location /api/kessler/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://kessler_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket Service — requires upgrade headers
        location /ws/ {
            proxy_pass http://events_service/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Health check endpoint
        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}
